name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write  # Required for trusted publishing
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Verify version tag matches package version
      if: github.event_name == 'release'
      run: |
        PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
        TAG_VERSION="${GITHUB_REF#refs/tags/v}"
        if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
          echo "::error::Version mismatch: pyproject.toml=$PKG_VERSION, tag=$TAG_VERSION"
          exit 1
        fi
        echo "Version verified: $PKG_VERSION"

    - name: Build package
      run: python -m build

    - name: Check package
      run: twine check dist/*

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: dist
        path: dist/

  test-install:
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.12', '3.13']
    steps:
    - uses: actions/download-artifact@v8
      with:
        name: dist
        path: dist/

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install from wheel (Unix)
      if: runner.os != 'Windows'
      run: pip install dist/*.whl

    - name: Install from wheel (Windows)
      if: runner.os == 'Windows'
      run: |
        $whl = Get-ChildItem dist/*.whl | Select-Object -First 1
        pip install $whl.FullName
      shell: pwsh

    - name: Verify import and version
      run: |
        python -c "import cbps; print(f'cbps {cbps.__version__} installed successfully')"
        python -c "from cbps import CBPS, npCBPS, CBMSM, hdCBPS, CBIV; print('All core imports OK')"

  publish-testpypi:
    needs: test-install
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: testpypi
    permissions:
      id-token: write
    steps:
    - uses: actions/download-artifact@v8
      with:
        name: dist
        path: dist/

    - name: Publish to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    needs: test-install
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment: pypi
    permissions:
      id-token: write
    steps:
    - uses: actions/download-artifact@v8
      with:
        name: dist
        path: dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
