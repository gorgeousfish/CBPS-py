# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the OS, Python version and other tools you might need
build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  apt_packages:
    - latexmk
    - texlive-latex-extra
    - texlive-fonts-recommended
    - texlive-plain-generic
  jobs:
    post_checkout:
      - git fetch --unshallow || true

# Build documentation in the "docs/" directory with Sphinx
sphinx:
  configuration: docs/conf.py
  fail_on_warning: true

# Optionally build your docs in additional formats such as PDF and ePub
formats:
  - pdf
  - epub

# Install the package and documentation dependencies.
#
# We include the ``sklearn`` and ``plots`` extras so that Sphinx autodoc can
# successfully import ``cbps.sklearn.CBPSEstimator`` and the
# ``cbps.diagnostics.plots`` helpers when rendering ``docs/api/sklearn.rst``
# and ``docs/api/diagnostics.rst``. Both extras are pure-Python wheels on
# PyPI, so they install reliably on the Read the Docs builders. The
# ``hdcbps`` extra is intentionally NOT installed because it requires a
# Fortran toolchain for ``glmnetforpython``; we mock that import in
# ``docs/conf.py`` instead.
python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
        - sklearn
        - plots
